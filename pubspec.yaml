name: flutter_app
description: AutoTradeX - AI 기반 한국 주식 자동매매 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  provider: 6.1.5+1

  # Local Storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # Networking
  http: 1.5.0

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # Security & Auth
  crypto: ^3.0.6          # HMAC-SHA256, SHA-256 해싱
  encrypt: ^5.0.3         # AES-256 암호화/복호화
  pointycastle: ^3.9.1    # 암호화 기반 라이브러리

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
